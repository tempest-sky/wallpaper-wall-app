name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}

      - name: Build release APK
        run: flutter build apk --release --dart-define=PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wallpaper-wall-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: wallpaper-wall-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
